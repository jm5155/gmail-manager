<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gmail Manager — AI-powered email management desktop application" />
  <title>Gmail Manager</title>
  <!-- Google Fonts: Inter for modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Tailwind CSS via CDN (as specified in the tech stack) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Tailwind config: custom colors matching our design system
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563EB',
            'bg-dark': '#0F172A',
            'surface': '#1E293B',
            'border-custom': '#334155',
            'text-primary': '#F1F5F9',
            'text-secondary': '#94A3B8',
            success: '#22C55E',
            warning: '#F59E0B',
            danger: '#EF4444',
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    /* Global base styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0F172A;
      color: #F1F5F9;
      overflow: hidden;
    }
    /* Smooth scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0F172A; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
