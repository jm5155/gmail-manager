# Railway Deployment Configuration
# Gmail Intelligence Manager - Backend API
# Last updated: 2026-07-21

[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[environments.production]
# Environment variables are set in Railway dashboard
# Required: DATABASE_URL (auto-provided by Railway Postgres)
# Required: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_REDIRECT_URI
# Required: GROQ_API_KEY, GEMINI_API_KEY, COHERE_API_KEY
# Optional: NVIDIA_API_KEY, GOOGLE_SAFE_BROWSING_KEY, ALLOWED_ORIGIN

[healthcheck]
path = "/"
timeout = 300
interval = 30
